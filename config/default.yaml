# Default runtime configuration for worldcup2026.
# Secrets must NOT live here — see .env / .env.example.

random_seed: 42

simulation:
  n_runs: 20000

elo:
  base_k: 30.0
  home_advantage: 65.0          # zeroed for World Cup matches at runtime
  initial_rating: 1500.0
  k_weights:                    # K multiplier by match importance
    friendly: 1.0
    qualifier: 1.5
    confederation: 2.0
    world_cup: 2.5

dixon_coles:
  time_decay_half_life_days: 540    # ~18 months
  rho_init: -0.1
  max_goals: 10

world_cup:
  # Training window for the pre-/in-tournament fit (scripts/resim_current_state.py).
  # Tuned via scripts/backtest_window.py (1X2 log-loss on WC2022 + recent
  # competitive holdouts). The optimum is flat across ~8-12y / 730-1095d.
  fit_window_years: 10
  fit_half_life_days: 1095
  # Host residual: small log-rate edge for the three 2026 co-hosts at otherwise
  # neutral venues. 0 disables. ~0.15 ≈ a ~16% scoring lift in their matches.
  host_advantage: 0.15
  hosts: ["Mexico", "United States", "Canada"]
  # Calibration temperature fit on out-of-sample outcomes (scripts/calibrate.py).
  # <1 sharpens the under-confident model. Pass via --temperature; mild (0.914)
  # because the holdout is easier than WC matches — it halves the average bias vs
  # market but does NOT fix per-match disagreement, so single-1X2 is not bettable.
  calibration_temperature: 0.914
